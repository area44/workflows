name: "Common Setup"
description: "Shared setup for Node.js and package managers"

inputs:
  node-version:
    description: "Optional Node.js version override"
    required: false
  install:
    description: "Whether to install dependencies"
    required: false
    default: "true"
  frozen-lockfile:
    description: "Whether to use frozen lockfile for installation"
    required: false
    default: "true"

outputs:
  node-version:
    description: "The Node.js version used"
    value: ${{ steps.detect_env.outputs.node_version }}
  package-manager:
    description: "The package manager used"
    value: ${{ steps.detect_env.outputs.package_manager }}
  package-manager-version:
    description: "The version of the package manager used"
    value: ${{ steps.detect_env.outputs.package_manager_version }}

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: node "${{ github.action_path }}/../../dist/detect-env.js"

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version || steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
        FROZEN_LOCKFILE: ${{ inputs.frozen-lockfile }}
      run: |
        if [[ "$FROZEN_LOCKFILE" == "true" ]]; then
          case "$PACKAGE_MANAGER" in
            pnpm) pnpm install --frozen-lockfile ;;
            bun) bun install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm) [[ -f package-lock.json ]] && npm ci || npm install ;;
            *) "$PACKAGE_MANAGER" install ;;
          esac
        else
          case "$PACKAGE_MANAGER" in
            pnpm) pnpm install --no-frozen-lockfile ;;
            bun) bun install ;;
            yarn) yarn install ;;
            npm) npm install ;;
            *) "$PACKAGE_MANAGER" install ;;
          esac
        fi
