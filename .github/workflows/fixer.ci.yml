name: fixer.ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dummy Project
        run: |
          rm -rf dummy-fixer
          mkdir -p dummy-fixer
          cd dummy-fixer
          echo '{"name": "dummy-fixer", "scripts": {"lint": "echo linting"}}' > package.json
          npm install --no-package-lock

      - name: Test Autofix Script
        run: node ../dist/fixer.js npm
        working-directory: dummy-fixer
