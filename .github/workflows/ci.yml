name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Detect enviroment
        shell: bash
        id: detect_env
        run: node "dist/detect-env.mjs"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run Main Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/detect-env.mjs && test -f dist/setup.mjs && test -f dist/run-scripts.mjs
