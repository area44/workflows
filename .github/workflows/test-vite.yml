name: Test Vite action
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Project
        run: |
          rm -rf vite-project
          mkdir -p vite-project
          cd vite-project
          echo '{"name": "vite-project", "scripts": {"build": "mkdir -p dist && touch dist/index.html"}}' > package.json
          npm install --no-package-lock

      - name: Test Vite Action
        uses: ./vite
        id: vite_action
        with:
          path: vite-project/dist
          build-command: "cd vite-project && npm run build"

      - name: Verify Vite Outputs
        run: |
          if [ -z "${{ steps.vite_action.outputs.node-version }}" ]; then exit 1; fi
