name: autofix.ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  main-test:
    name: Unit Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Main Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/detect-env.js && test -f dist/autofix.js && test -f dist/detect-env.ts && test -f dist/autofix.ts

  test-astro:
    name: Test Astro Action
    runs-on: ubuntu-latest
    needs: main-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dummy Project
        run: |
          rm -rf dummy-astro
          mkdir -p dummy-astro
          cd dummy-astro
          echo '{"name": "dummy-astro", "engines": {"node": "20"}, "scripts": {"build": "mkdir -p dist && touch dist/index.html"}}' > package.json
          npm install --no-package-lock

      - name: Test Astro Action
        uses: ./astro
        id: astro_action
        with:
          path: dummy-astro/dist
          build-command: "cd dummy-astro && npm run build"

  test-vite:
    name: Test Vite Action
    runs-on: ubuntu-latest
    needs: test-astro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dummy Project
        run: |
          rm -rf dummy-vite
          mkdir -p dummy-vite
          cd dummy-vite
          echo '{"name": "dummy-vite", "scripts": {"build": "mkdir -p dist && touch dist/index.html"}}' > package.json
          npm install --no-package-lock

      - name: Test Vite Action
        uses: ./vite
        id: vite_action
        with:
          path: dummy-vite/dist
          build-command: "cd dummy-vite && npm run build"

  test-autofix:
    name: Test Autofix Action
    runs-on: ubuntu-latest
    needs: test-vite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dummy Project
        run: |
          rm -rf dummy-autofix
          mkdir -p dummy-autofix
          cd dummy-autofix
          echo '{"name": "dummy-autofix", "scripts": {"lint": "echo linting"}}' > package.json
          npm install --no-package-lock

      - name: Test Autofix Action
        uses: ./autofix
