name: area44/lint-format
description: Run lint/format scripts
inputs:
  node-version:
    description: "Optional Node.js version override"
    required: false

outputs:
  node-version:
    description: "The Node.js version used"
    value: ${{ steps.setup.outputs.node-version }}
  package-manager:
    description: "The package manager used"
    value: ${{ steps.setup.outputs.package-manager }}
  package-manager-version:
    description: "The version of the package manager used"
    value: ${{ steps.setup.outputs.package-manager-version }}

runs:
  using: "composite"
  steps:
    - name: Setup environment
      id: setup
      uses: ./setup
      with:
        node-version: ${{ inputs.node-version }}
        frozen-lockfile: "false"

    - name: Run lint/format scripts
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.setup.outputs.package-manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          bun) bun run "${{ github.action_path }}/../dist/run-scripts.js" ;;
          pnpm) pnpm exec node "${{ github.action_path }}/../dist/run-scripts.js" ;;
          yarn) yarn node "${{ github.action_path }}/../dist/run-scripts.js" ;;
          *) npm exec -- node "${{ github.action_path }}/../dist/run-scripts.js" ;;
        esac

    - name: Run autofix.ci
      uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1
