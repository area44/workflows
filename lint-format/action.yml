name: area44/lint-format
description: Run lint/format scripts
inputs:
  node-version:
    description: "Optional Node.js version override"
    required: false

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: node "${GITHUB_ACTION_PATH}/../dist/detect-env.js"

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@v6
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version || steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock
          **/bun.lockb

    - name: Prepare PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      shell: bash
      run: |
        echo "PNPM_SKIP_CHECK_BUILDS=true" >> "$GITHUB_ENV"
        pnpm approve-builds esbuild sharp || true

    - name: Install dependencies
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          pnpm) pnpm install --prefer-offline --no-frozen-lockfile ;;
          bun) bun install ;;
          yarn) yarn install --prefer-offline ;;
          npm) npm install ;;
        esac

    - name: Run lint/format scripts
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
      run: |
        if [ -f "package.json" ]; then
          SCRIPTS=$(jq -r '.scripts // {} | keys | .[]' package.json)

          run_script() {
            echo "Executing: $PACKAGE_MANAGER run $1"
            $PACKAGE_MANAGER run "$1" || { echo "::error::Script \"$1\" failed"; return 1; }
          }

          has_script() {
            echo "$SCRIPTS" | grep -q "^$1$"
          }

          if has_script "check"; then
            echo "Detected lint/format scripts: check"
            run_script "check"
          elif has_script "format" && has_script "lint"; then
            echo "Detected lint/format scripts: format, lint"
            run_script "format" && run_script "lint"
          elif has_script "fmt" && has_script "lint"; then
            echo "Detected lint/format scripts: fmt, lint"
            run_script "fmt" && run_script "lint"
          elif has_script "lint"; then
            echo "Detected lint/format scripts: lint"
            run_script "lint"
          elif has_script "format"; then
            echo "Detected lint/format scripts: format"
            run_script "format"
          elif has_script "fmt"; then
            echo "Detected lint/format scripts: fmt"
            run_script "fmt"
          else
            echo "No matching lint/format scripts (check, format, lint, etc.) found in package.json."
          fi
        else
          echo "No package.json found. Skipping lint/format scripts."
        fi

    - name: Run autofix.ci
      uses: autofix-ci/action@v1
