name: area44/images
description: Optimize images
inputs:
  node-version:
    description: "Optional Node.js version override"
    required: false
  convert-webp:
    description: "Whether to convert images to WebP"
    required: false
    default: "false"
  convert-avif:
    description: "Whether to convert images to AVIF"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: node "${GITHUB_ACTION_PATH}/../dist/detect-env.js"

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@v6
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version || steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock
          **/bun.lockb

    - name: Prepare PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      shell: bash
      run: echo "PNPM_SKIP_CHECK_BUILDS=true" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      run: |
        if command -v apt-get >/dev/null; then
          sudo apt-get update && sudo apt-get install -y optipng jpegoptim gifsicle webp libavif-bin
        fi

    - name: Optimize Images
      shell: bash
      env:
        CONVERT_WEBP: ${{ inputs.convert-webp }}
        CONVERT_AVIF: ${{ inputs.convert-avif }}
      run: |
        echo "Optimizing SVGs..."
        npx svgo -r . || true

        echo "Optimizing PNGs..."
        find . -name "*.png" -not -path "./node_modules/*" -exec optipng -o2 {} + || true

        echo "Optimizing JPEGs..."
        find . \( -name "*.jpg" -o -name "*.jpeg" \) -not -path "./node_modules/*" -exec jpegoptim --strip-all {} + || true

        echo "Optimizing GIFs..."
        find . -name "*.gif" -not -path "./node_modules/*" -exec gifsicle -O3 --batch {} + || true

        if [ "$CONVERT_WEBP" = "true" ]; then
          echo "Converting images to WebP..."
          find . \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -not -path "./node_modules/*" -exec sh -c 'cwebp -quiet -q 80 "$1" -o "${1%.*}.webp"' _ {} \; || true
        fi

        if [ "$CONVERT_AVIF" = "true" ]; then
          echo "Converting images to AVIF..."
          find . \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -not -path "./node_modules/*" -exec sh -c 'avifenc --quiet --jobs all "$1" "${1%.*}.avif"' _ {} \; || true
        fi

    - name: Run autofix.ci
      uses: autofix-ci/action@v1
