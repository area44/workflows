name: area44/vite
description: Build and Deploy with Vite
inputs:
  path:
    description: "The directory where the built site is located"
    required: false
    default: "dist"
  node-version:
    description: "Optional Node.js version override (e.g., '24', 'lts/*')"
    required: false
  build-command:
    description: "Optional build command override (e.g., 'npm run build')"
    required: false
  working-directory:
    description: "The directory where the project is located"
    required: false
    default: "."

outputs:
  node-version:
    description: "The Node.js version used"
    value: ${{ steps.detect_env.outputs.node-version }}
  package-manager:
    description: "The package manager used"
    value: ${{ steps.detect_env.outputs.package-manager }}
  package-manager-version:
    description: "The version of the package manager used"
    value: ${{ steps.detect_env.outputs.package-manager-version }}

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: node "${{ github.action_path }}/../dist/detect-env.js" "${{ inputs.working-directory }}"

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package-manager == 'pnpm' }}
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      with:
        version: ${{ steps.detect_env.outputs.package-manager-version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package-manager == 'bun' }}
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package-manager-version }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version || steps.detect_env.outputs.node-version }}
        cache: ${{ steps.detect_env.outputs.package-manager != 'bun' && steps.detect_env.outputs.package-manager || '' }}
        cache-dependency-path: |
          ${{ inputs.working-directory }}/**/package-lock.json
          ${{ inputs.working-directory }}/**/pnpm-lock.yaml
          ${{ inputs.working-directory }}/**/yarn.lock
          ${{ inputs.working-directory }}/**/bun.lock

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package-manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          pnpm) pnpm install --frozen-lockfile ;;
          bun) bun install --frozen-lockfile ;;
          yarn) yarn install --frozen-lockfile ;;
          npm) [[ -f package-lock.json ]] && npm ci || npm install ;;
          *) "$PACKAGE_MANAGER" install ;;
        esac

    - name: Set site variables
      shell: bash
      env:
        REPO: ${{ github.event.repository.name }}
        OWNER: ${{ github.repository_owner }}
      run: |
        if [[ "$REPO" == "${OWNER}.github.io" ]]; then
          echo "VITE_SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
          echo "BASE=/" >> "$GITHUB_ENV"
        else
          echo "VITE_SITE_URL=https://${OWNER}.github.io/$REPO" >> "$GITHUB_ENV"
          echo "BASE=/$REPO/" >> "$GITHUB_ENV"
        fi

    - name: Build Vite site
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package-manager }}
        BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        if [[ -n "$BUILD_COMMAND" ]]; then
          eval "$BUILD_COMMAND"
        else
          "$PACKAGE_MANAGER" run build
        fi

    - name: Upload site artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
      with:
        path: ${{ inputs.working-directory }}/${{ inputs.path }}
