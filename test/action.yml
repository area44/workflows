name: area44/test
description: Run test scripts
inputs:
  node-version:
    description: "Optional Node.js version override"
    required: false
  working-directory:
    description: "The directory where the project is located"
    required: false
    default: "."

outputs:
  node-version:
    description: "The Node.js version used"
    value: ${{ steps.setup.outputs.node-version }}
  package-manager:
    description: "The package manager used"
    value: ${{ steps.setup.outputs.package-manager }}
  package-manager-version:
    description: "The version of the package manager used"
    value: ${{ steps.setup.outputs.package-manager-version }}

runs:
  using: "composite"
  steps:
    - name: Setup
      id: setup
      uses: ../setup
      with:
        node-version: ${{ inputs.node-version }}
        working-directory: ${{ inputs.working-directory }}

    - name: Run test scripts
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.setup.outputs.package-manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          bun) bun run "${{ github.action_path }}/../dist/run-scripts.js" "${{ inputs.working-directory }}" ;;
          pnpm) pnpm exec node "${{ github.action_path }}/../dist/run-scripts.js" "${{ inputs.working-directory }}" ;;
          yarn) yarn node "${{ github.action_path }}/../dist/run-scripts.js" "${{ inputs.working-directory }}" ;;
          *) npm exec -- node "${{ github.action_path }}/../dist/run-scripts.js" "${{ inputs.working-directory }}" ;;
        esac
