name: area44/autofix.ci
description: Run autofix.ci

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: |
        node -e "
          const fs = require('fs');
          const path = require('path');

          let node_version = 'lts/*';
          let package_manager = 'npm';
          let package_manager_version = 'latest';

          if (fs.existsSync('.nvmrc')) {
            node_version = fs.readFileSync('.nvmrc', 'utf8').trim();
          } else if (fs.existsSync('package.json')) {
            try {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.engines && pkg.engines.node) {
                node_version = pkg.engines.node;
              }
            } catch (e) {}
          }

          if (fs.existsSync('pnpm-lock.yaml')) {
            package_manager = 'pnpm';
          } else if (fs.existsSync('yarn.lock')) {
            package_manager = 'yarn';
          } else if (fs.existsSync('package-lock.json')) {
            package_manager = 'npm';
          } else if (fs.existsSync('bun.lockb') || fs.existsSync('bun.lock')) {
            package_manager = 'bun';
          } else if (fs.existsSync('package.json')) {
            try {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.packageManager) {
                const [name, version] = pkg.packageManager.split('@');
                package_manager = name;
                package_manager_version = version || 'latest';
              }
            } catch (e) {}
          }

          const output = [
            \`node_version=\${node_version}\`,
            \`package_manager=\${package_manager}\`,
            \`package_manager_version=\${package_manager_version}\`
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, output + '\n');
          console.log('Detected Node.js: ' + node_version + ' | Package Manager: ' + package_manager + '@' + package_manager_version);
        "

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock
          **/bun.lockb

    - name: Install dependencies
      shell: bash
      run: |
        package_manager="${{ steps.detect_env.outputs.package_manager }}"
        case "$package_manager" in
          pnpm) pnpm install --frozen-lockfile ;;
          bun) bun install --frozen-lockfile ;;
          yarn) yarn install --frozen-lockfile ;;
          npm) [[ -f package-lock.json ]] && npm ci || npm install ;;
          *) $package_manager install ;;
        esac

    - name: Run scripts
      shell: bash
      run: |
        scripts="$(node -e "
          const fs = require('fs');
          if (!fs.existsSync('package.json')) process.exit(0);

          const scripts = require('./package.json').scripts || {};

          const cases = [
            ['check'],
            ['format', 'lint'],
            ['fmt', 'lint'],
            ['lint'],
            ['format'],
            ['fmt'],
          ];

          for (const group of cases) {
            if (group.every(name => scripts[name])) {
              console.log(group.join(' '));
              break;
            }
          }
        ")"

        if [[ -n "$scripts" ]]; then
          for script in $scripts; do
            "${{ steps.detect_env.outputs.package_manager }}" run "$script"
          done
        else
          echo "No matching scripts found."
        fi

    - name: Run autofix.ci
      uses: autofix-ci/action@v1.3.3
