name: area44/autofix.ci
description: Run autofix.ci
inputs:
  node-version:
    description: "Optional Node.js version override"
    required: false

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: node "${GITHUB_ACTION_PATH}/../src/detect-env.js"

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@feaa2f710aee579c21b811984a164bc88a598691 # v4.0.0
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@4623fc02173f9123e8d8b29bc601896a748d6ca7 # v2.0.1
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@393f3e7e6204592224097f4b4458da77651a080d # v4.1.0
      with:
        node-version: ${{ inputs.node-version || steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock
          **/bun.lockb

    - name: Install dependencies
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          pnpm) pnpm install --frozen-lockfile ;;
          bun) bun install --frozen-lockfile ;;
          yarn) yarn install --frozen-lockfile ;;
          npm) [[ -f package-lock.json ]] && npm ci || npm install ;;
          *) "$PACKAGE_MANAGER" install ;;
        esac

    - name: Run scripts
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
      run: node "${GITHUB_ACTION_PATH}/../src/autofix.js" "$PACKAGE_MANAGER"

    - name: Run autofix.ci
      uses: autofix-ci/action@2891da933ee04739502693240a59976723223126 # v1.3.1
