name: area44/autofix.ci
description: Run autofix.ci

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      id: detect_env
      uses: ./detect-env

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock
          **/bun.lockb

    - name: Install dependencies
      shell: bash
      run: |
        package_manager="${{ steps.detect_env.outputs.package_manager }}"
        case "$package_manager" in
          pnpm) pnpm install --frozen-lockfile ;;
          bun) bun install --frozen-lockfile ;;
          yarn) yarn install --frozen-lockfile ;;
          npm) [[ -f package-lock.json ]] && npm ci || npm install ;;
          *) $package_manager install ;;
        esac

    - name: Run scripts
      shell: bash
      run: |
        scripts="$(node -e "
          const fs = require('fs');
          if (!fs.existsSync('package.json')) process.exit(0);

          const scripts = require('./package.json').scripts || {};

          const cases = [
            ['check'],
            ['format', 'lint'],
            ['fmt', 'lint'],
            ['lint'],
            ['format'],
            ['fmt'],
          ];

          for (const group of cases) {
            if (group.every(name => scripts[name])) {
              console.log(group.join(' '));
              break;
            }
          }
        ")"

        if [[ -n "$scripts" ]]; then
          for script in $scripts; do
            "${{ steps.detect_env.outputs.package_manager }}" run "$script"
          done
        else
          echo "No matching scripts found."
        fi

    - name: Run autofix.ci
      uses: autofix-ci/action@v1.3.3
