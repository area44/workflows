name: area44/astro
description: Build and Deploy Astro Site
inputs:
  path:
    description: "The directory where the built site is located"
    required: false
    default: "dist"
  node-version:
    description: "Optional Node.js version override (e.g., '24', 'lts/*')"
    required: false
  build-command:
    description: "Optional build command override (e.g., 'npm run build')"
    required: false
    default: "npm run build"

outputs:
  node-version:
    description: "The Node.js version used"
    value: ${{ inputs.node-version || steps.detect_env.outputs.node_version }}
  package-manager:
    description: "The package manager used"
    value: ${{ steps.detect_env.outputs.package_manager }}

runs:
  using: "composite"
  steps:
    - name: Detect Node.js version and package manager
      shell: bash
      id: detect_env
      run: node "${GITHUB_ACTION_PATH}/../dist/detect-env.mjs"

    - name: Setup PNPM
      if: ${{ steps.detect_env.outputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@v5
      with:
        version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Bun
      if: ${{ steps.detect_env.outputs.package_manager == 'bun' }}
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.detect_env.outputs.package_manager_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version || steps.detect_env.outputs.node_version }}
        cache: ${{ steps.detect_env.outputs.package_manager != 'bun' && steps.detect_env.outputs.package_manager || '' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock
          **/bun.lock
          **/bun.lockb

    - name: Set site variables
      shell: bash
      env:
        REPO: ${{ github.event.repository.name }}
        OWNER: ${{ github.repository_owner }}
      run: |
        echo "SITE=https://${OWNER}.github.io" >> "$GITHUB_ENV"
        if [[ "$REPO" == "${OWNER}.github.io" ]]; then
          echo "BASE=/" >> "$GITHUB_ENV"
        else
          echo "BASE=/${REPO}/" >> "$GITHUB_ENV"
        fi

    - name: Install dependencies
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          pnpm) pnpm install --frozen-lockfile ;;
          bun) bun install --frozen-lockfile ;;
          yarn) yarn install --frozen-lockfile ;;
          npm) [[ -f package-lock.json ]] && npm ci || npm install ;;
          *) "$PACKAGE_MANAGER" install ;;
        esac

    - name: Build Astro site
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ steps.detect_env.outputs.package_manager }}
        BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        if [[ -n "$BUILD_COMMAND" ]]; then
          eval "$BUILD_COMMAND"
        else
          "$PACKAGE_MANAGER" run build
        fi

    - name: Upload site artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: ${{ inputs.path }}
